name = "betelino-web"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "betelino-web"

[[d1_databases]]
binding = "DB"
database_name = "betelino-db"
database_id = "12909816-6996-4911-bfaf-793f1f9ce01f"
migrations_dir = "drizzle/migrations"
remote = true

[[r2_buckets]]
binding = "MATERIALS"
bucket_name = "betelino-materials"
